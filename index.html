<style>
  :root{
    --blue:#90D5FF; --blue-deep:#4FA9DD; --coin:#2E8BC0;
    --pink:#FFB0C8; --pink-deep:#F27DA0;
    --mint:#A8E6CF; --mint-deep:#5FC79A;
    --lav:#C9B6E4; --coral:#FF8A8A;
    --bg-2:#EAF6FF; --card:#FFFFFF; --card-hi:#F4FBFF; --line:#DCEEF9;
    --ivory:#2D4A5B; --muted:#6E8DA0; --muted-2:#A2BACA;
    --radius:20px; --shadow:0 12px 30px rgba(120,180,220,.20);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Nunito',system-ui,sans-serif;background:radial-gradient(120% 70% at 50% -5%, #DCF1FF 0%, #F3FAFF 45%, #FFFFFF 100%);color:var(--ivory);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  .app{max-width:460px;margin:0 auto;padding:0 16px 120px;}

  header{padding:22px 2px 14px;display:flex;align-items:center;justify-content:space-between;}
  .brand h1{font-family:'Quicksand',sans-serif;font-weight:700;font-size:28px;letter-spacing:-.3px;margin:0;background:linear-gradient(92deg,var(--blue-deep),var(--pink-deep) 95%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .brand h1 .em{-webkit-text-fill-color:initial;font-size:22px;}
  .h-right{display:flex;align-items:center;gap:9px;}
  .role-badge{font-family:'Quicksand',sans-serif;font-weight:700;font-size:12px;padding:6px 11px;border-radius:999px;display:flex;align-items:center;gap:5px;}
  .role-badge.master{background:rgba(79,169,221,.16);color:var(--blue-deep);}
  .role-badge.player{background:rgba(242,125,160,.16);color:var(--pink-deep);}
  .gear{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:6px;border-radius:12px;}
  .gear:active{background:var(--bg-2);}

  .peekbar{display:flex;align-items:center;gap:8px;background:rgba(79,169,221,.12);border:1px solid rgba(79,169,221,.3);color:var(--blue-deep);font-weight:700;font-size:13px;padding:10px 14px;border-radius:14px;margin:14px 0 2px;}
  .peekbar button{margin-left:auto;background:var(--blue);color:#15455F;border:none;font-family:'Quicksand',sans-serif;font-weight:700;font-size:12.5px;padding:8px 13px;border-radius:999px;cursor:pointer;}

  .hero{background:linear-gradient(160deg,#FFFFFF,var(--card-hi));border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:var(--shadow);margin-bottom:18px;position:relative;overflow:hidden;}
  .hero:after{content:"🌸";position:absolute;right:-6px;bottom:-10px;font-size:64px;opacity:.10;transform:rotate(-12deg);}
  .hero.master:after{content:"⚔️";font-size:58px;opacity:.08;}
  .hero .who{font-family:'Quicksand',sans-serif;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;font-weight:600;}
  .hero .bal{display:flex;align-items:flex-end;gap:8px;}
  .hero .bal .num{font-family:'Quicksand',sans-serif;font-weight:700;font-size:52px;line-height:.95;color:var(--coin);}
  .hero .bal .lab{font-size:13px;color:var(--muted);margin-bottom:9px;font-weight:600;}
  .hero-meta{display:flex;gap:16px;margin-top:16px;align-items:center;flex-wrap:wrap;}
  .pill{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ivory);font-weight:700;}
  .pill .e{font-size:15px;}
  .owe-pill{margin-top:14px;background:rgba(46,139,192,.10);border:1px solid rgba(46,139,192,.3);border-radius:12px;padding:10px 13px;font-size:13px;font-weight:700;color:var(--coin);display:flex;align-items:center;gap:7px;}
  .hero-btn{margin-top:14px;background:rgba(46,139,192,.10);border:1px solid rgba(46,139,192,.3);color:var(--coin);font-family:'Quicksand',sans-serif;font-weight:700;font-size:13px;padding:9px 15px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .hero-btn:active{transform:scale(.97);}
  .xpwrap{margin-top:14px;}
  .xpbar{height:10px;background:#E8F4FC;border-radius:99px;overflow:hidden;border:1px solid var(--line);}
  .xpfill{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--pink));border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .xptext{display:flex;justify-content:space-between;font-size:11px;color:var(--muted-2);margin-top:6px;font-weight:600;}

  .tabs{display:flex;gap:6px;margin-bottom:16px;}
  .tabs button{flex:1;background:#FFFFFF;border:1px solid var(--line);color:var(--muted);font-family:'Quicksand',sans-serif;font-weight:600;font-size:13px;padding:11px;border-radius:14px;cursor:pointer;transition:.15s;}
  .tabs button.active{background:var(--blue);color:#15455F;border-color:var(--blue);}
  .sortbar{display:flex;align-items:center;gap:6px;margin:0 2px 13px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .sortbar::-webkit-scrollbar{display:none;}
  .sortlab{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;}
  .sortpill{flex-shrink:0;background:#fff;border:1px solid var(--line);color:var(--muted);font-family:'Quicksand',sans-serif;font-weight:700;font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;}
  .sortpill.active{background:var(--blue);border-color:var(--blue);color:#15455F;}
  .sortpill:active{transform:scale(.96);}
  .approve-row{display:flex;gap:8px;margin-top:11px;}
  .approve-btn{flex:1;background:linear-gradient(180deg,#7BE0B0,#46C98C);border:none;color:#0B3D2C;font-family:'Quicksand',sans-serif;font-weight:700;font-size:14px;padding:12px;border-radius:14px;cursor:pointer;}
  .approve-btn:active{transform:scale(.98);}
  .reject-btn{flex:0 0 auto;background:#fff;border:1px solid var(--line);color:var(--muted);font-family:'Quicksand',sans-serif;font-weight:700;font-size:13px;padding:12px 16px;border-radius:14px;cursor:pointer;}
  .reject-btn:active{transform:scale(.97);}
  .quest.pending{border-color:#F2C879;background:linear-gradient(180deg,#FFFDF6,#FFF7E8);}
  .done-stamp.pend{color:#B07A1E;}
  .approve-pill{margin-top:13px;background:rgba(255,255,255,.20);border:1px solid rgba(255,255,255,.4);color:#fff;font-weight:700;font-size:13px;padding:11px 14px;border-radius:14px;cursor:pointer;text-align:center;}
  .approve-pill:active{transform:scale(.99);}
  .pts-input{width:100%;background:var(--card-hi);border:1px solid var(--line);border-radius:14px;color:var(--coin);font-family:'Quicksand',sans-serif;font-weight:700;font-size:24px;padding:13px 14px;text-align:center;-moz-appearance:textfield;}
  .pts-input:focus{outline:none;border-color:var(--blue-deep);background:#fff;}
  .pswitch{display:flex;gap:8px;margin-bottom:16px;background:var(--card-hi);border:1px solid var(--line);border-radius:16px;padding:5px;}
  .pswitch-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:transparent;border:none;color:var(--muted);font-family:'Quicksand',sans-serif;font-weight:700;font-size:14px;padding:10px;border-radius:12px;cursor:pointer;transition:.15s;}
  .pswitch-btn.active{background:var(--blue);color:#15455F;box-shadow:0 3px 10px rgba(120,180,220,.25);}
  .pbadge{display:inline-flex;align-items:center;justify-content:center;min-width:19px;height:19px;padding:0 5px;background:#F2994A;color:#fff;font-size:11px;font-weight:800;border-radius:999px;}
  .pswitch-btn.active .pbadge{background:#15455F;}

  .section-head{display:flex;justify-content:space-between;align-items:center;margin:4px 2px 12px;}
  .section-head h2{font-family:'Quicksand',sans-serif;font-weight:700;font-size:19px;margin:0;}
  .grouplab{font-size:12px;color:var(--muted);margin:0 2px 9px;letter-spacing:.5px;text-transform:uppercase;font-weight:700;}
  .grouplab.sp{margin-top:18px;}
  .grouplab.coin{color:var(--coin);}
  .add-btn{background:var(--blue);color:#15455F;border:none;font-family:'Quicksand',sans-serif;font-weight:700;font-size:13px;padding:9px 14px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 4px 12px rgba(144,213,255,.5);}
  .add-btn:active{transform:scale(.96);}

  .quest{background:#FFFFFF;border:1px solid var(--line);border-radius:var(--radius);padding:15px 15px 14px;margin-bottom:11px;position:relative;transition:.2s;box-shadow:0 6px 16px rgba(120,180,220,.10);}
  .quest.done{opacity:.6;}
  .quest .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;}
  .quest .title{font-weight:700;font-size:15.5px;line-height:1.3;}
  .quest.done .title{text-decoration:line-through;text-decoration-color:var(--muted-2);}
  .quest .note{color:var(--muted);font-size:13px;margin-top:5px;line-height:1.45;font-weight:500;}
  .reward-tag{flex-shrink:0;background:rgba(46,139,192,.14);color:var(--coin);border:1px solid rgba(46,139,192,.32);font-weight:800;font-size:13px;padding:5px 10px;border-radius:999px;white-space:nowrap;}
  .quest .meta{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:11.5px;color:var(--muted-2);flex-wrap:wrap;font-weight:600;}
  .quest .act{margin-top:13px;}
  .complete-btn{width:100%;background:linear-gradient(95deg,var(--mint),var(--mint-deep));color:#15553B;border:none;font-family:'Quicksand',sans-serif;font-weight:700;font-size:14px;padding:13px;border-radius:14px;cursor:pointer;transition:.15s;box-shadow:0 4px 12px rgba(95,199,154,.4);}
  .complete-btn:active{transform:scale(.98);}
  .done-stamp{display:flex;align-items:center;justify-content:center;gap:7px;color:var(--mint-deep);font-weight:700;font-size:13.5px;padding:11px;}
  .waiting{display:flex;align-items:center;gap:7px;color:var(--muted);font-weight:600;font-size:13px;padding:10px 0 2px;}
  .x-btn{background:none;border:none;color:var(--muted-2);font-size:13px;cursor:pointer;margin-left:auto;font-weight:700;text-decoration:underline;font-family:inherit;}

  .reward{background:linear-gradient(150deg,#FFFFFF,var(--card-hi));border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:11px;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 6px 16px rgba(120,180,220,.10);}
  .reward .info .t{font-weight:700;font-size:15px;}
  .reward .info .c{color:var(--coin);font-weight:700;font-size:13px;margin-top:4px;display:flex;align-items:center;gap:4px;}
  .redeem-btn{background:var(--pink);color:#7A1E3C;border:none;font-family:'Quicksand',sans-serif;font-weight:700;font-size:13px;padding:11px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;box-shadow:0 4px 12px rgba(255,176,200,.55);}
  .redeem-btn:disabled{background:#EEF4F8;color:var(--muted-2);cursor:not-allowed;border:1px solid var(--line);box-shadow:none;}
  .redeem-btn:active:not(:disabled){transform:scale(.96);}
  .reward-del{background:none;border:none;color:var(--muted-2);font-size:20px;cursor:pointer;line-height:1;padding:4px 6px;border-radius:8px;}
  .reward-del:active{background:var(--bg-2);}
  .reward-edit{background:rgba(79,169,221,.12);border:1px solid rgba(79,169,221,.25);color:var(--blue-deep);font-family:'Quicksand',sans-serif;font-weight:700;font-size:12px;padding:7px 11px;border-radius:999px;cursor:pointer;white-space:nowrap;}
  .reward-edit:active{background:rgba(79,169,221,.25);}
  .reward-actions{display:flex;align-items:center;gap:7px;flex-shrink:0;}

  .pending{background:rgba(46,139,192,.12);border:1px dashed rgba(46,139,192,.45);border-radius:16px;padding:13px 15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .pending.soft{background:rgba(255,176,200,.14);border-color:rgba(242,125,160,.4);}
  .pending .t{font-weight:700;font-size:14px;}
  .pending .s{font-size:12px;color:var(--muted);margin-top:3px;font-weight:600;}
  .fulfill-btn{background:var(--coin);color:#0E3A52;border:none;font-family:'Quicksand',sans-serif;font-weight:700;font-size:12.5px;padding:10px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;}

  .daily-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px 16px;margin-bottom:10px;box-shadow:0 4px 12px rgba(120,180,220,.10);}
  .daily-progress{display:flex;align-items:baseline;gap:7px;}
  .dp-count{font-family:'Quicksand',sans-serif;font-weight:700;font-size:26px;color:var(--coin);}
  .dp-sep{font-size:18px;color:var(--muted-2);margin:0 1px;}
  .dp-label{font-size:13px;color:var(--muted);font-weight:600;}
  .dp-reset{font-size:12px;color:var(--muted-2);font-weight:600;}
  .day-xpbar{height:7px;background:#E8F4FC;border-radius:99px;overflow:hidden;border:1px solid var(--line);margin-bottom:16px;}
  .day-xpfill{height:100%;background:linear-gradient(90deg,var(--mint),var(--mint-deep));border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .all-done-card{background:linear-gradient(135deg,rgba(168,230,207,.3),rgba(144,213,255,.3));border:1px solid var(--mint);border-radius:16px;padding:16px;text-align:center;font-weight:700;font-size:14px;color:var(--mint-deep);margin-bottom:14px;}
  .feed-item .ic{width:36px;height:36px;border-radius:50%;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .feed-item .tx{font-size:13.5px;line-height:1.4;font-weight:500;}
  .feed-item .tx b{color:var(--ivory);font-weight:800;}
  .feed-item .tm{font-size:11px;color:var(--muted-2);margin-top:3px;font-weight:600;}

  .empty{text-align:center;color:var(--muted-2);padding:42px 20px;font-size:14px;line-height:1.6;font-weight:600;}
  .empty .big{font-size:34px;display:block;margin-bottom:10px;opacity:.85;}

  .rolepick{min-height:88vh;display:flex;align-items:center;justify-content:center;padding:20px 4px;}
  .rp-card{width:100%;text-align:center;}
  .rp-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:40px;background:linear-gradient(92deg,var(--blue-deep),var(--pink-deep));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .rp-logo .em{-webkit-text-fill-color:initial;}
  .rp-sub{color:var(--muted);font-weight:600;margin:6px 0 26px;font-size:15px;}
  .rp-btn{width:100%;display:flex;align-items:center;gap:14px;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:18px;margin-bottom:13px;cursor:pointer;font-family:inherit;transition:.18s;box-shadow:0 8px 20px rgba(120,180,220,.12);}
  .rp-btn:active{transform:scale(.98);}
  .rp-btn .rp-ic{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;position:relative;}
  .rp-btn.master .rp-ic{background:rgba(144,213,255,.3);}
  .rp-btn.player .rp-ic{background:rgba(255,176,200,.3);}
  .rp-btn .lock{position:absolute;right:-4px;bottom:-4px;font-size:15px;background:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.12);}
  .rp-btn b{font-family:'Quicksand',sans-serif;font-size:18px;display:block;color:var(--ivory);}
  .rp-btn small{color:var(--muted);font-size:13px;font-weight:600;}
  .rp-btn.master{border-color:rgba(144,213,255,.6);}
  .rp-btn.player{border-color:rgba(255,176,200,.6);}
  .rp-foot{color:var(--muted-2);font-size:12px;margin-top:14px;font-weight:600;}

  .scrim{position:fixed;inset:0;background:rgba(90,140,180,.35);backdrop-filter:blur(5px);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .scrim.show{display:flex;}
  .sheet{width:100%;max-width:460px;background:#FFFFFF;border:1px solid var(--line);border-bottom:none;border-radius:26px 26px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -18px 50px rgba(90,140,180,.25);animation:rise .28s cubic-bezier(.2,.9,.3,1);}
  @keyframes rise{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet h3{font-family:'Quicksand',sans-serif;font-weight:700;font-size:21px;margin:0 0 6px;}
  .sheet .hint{color:var(--muted);font-size:13px;font-weight:600;margin:0 0 16px;line-height:1.45;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.3px;}
  .field input[type=text],.field input[type=password],.field textarea{width:100%;background:var(--card-hi);border:1px solid var(--line);border-radius:14px;color:var(--ivory);font-family:inherit;font-size:15px;padding:13px;resize:none;font-weight:600;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--blue);background:#fff;}
  .pts-row{display:flex;align-items:center;gap:14px;}
  .pts-row input[type=range]{flex:1;accent-color:var(--blue-deep);}
  .pts-val{font-family:'Quicksand',sans-serif;font-weight:700;font-size:26px;color:var(--coin);min-width:54px;text-align:right;}
  .sheet-actions{display:flex;gap:10px;margin-top:8px;}
  .btn-ghost{flex:1;background:#fff;border:1px solid var(--line);color:var(--muted);font-family:'Quicksand',sans-serif;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;}
  .btn-primary{flex:2;background:var(--blue);color:#15455F;border:none;font-family:'Quicksand',sans-serif;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;font-size:15px;box-shadow:0 4px 14px rgba(144,213,255,.55);}
  .btn-primary:active{transform:scale(.98);}
  .name-edit{display:flex;gap:8px;margin-bottom:10px;}
  .name-edit input{flex:1;background:var(--card-hi);border:1px solid var(--line);border-radius:12px;color:var(--ivory);font-family:inherit;padding:11px;font-size:14px;font-weight:600;}
  .set-action{width:100%;background:var(--card-hi);border:1px solid var(--line);color:var(--ivory);font-family:'Quicksand',sans-serif;font-weight:700;font-size:14px;padding:13px;border-radius:14px;cursor:pointer;margin-bottom:10px;text-align:left;display:flex;align-items:center;gap:9px;}
  .set-action:active{background:var(--bg-2);}
  .set-action .tail{margin-left:auto;color:var(--muted);font-weight:600;font-size:12px;}
  .danger-link{background:none;border:none;color:var(--coral);font-family:inherit;font-size:13px;text-decoration:underline;cursor:pointer;padding:8px 0 2px;font-weight:700;}
  .cl{margin-bottom:15px;}
  .cl-v{font-family:'Quicksand',sans-serif;font-weight:700;color:var(--coin);font-size:15px;margin-bottom:5px;}
  .cl-list{margin:0;padding-left:18px;color:var(--ivory);font-size:13.5px;font-weight:600;line-height:1.55;}
  .cl-list li{margin-bottom:3px;}
  .set-ver{text-align:center;color:var(--muted-2);font-size:12px;font-weight:700;margin-top:14px;}

  .fly{position:fixed;font-family:'Quicksand',sans-serif;font-weight:700;font-size:30px;color:var(--coin);pointer-events:none;z-index:80;text-shadow:0 2px 12px rgba(46,139,192,.45);}
  @keyframes flyup{0%{transform:translateY(0) scale(.7);opacity:0;}20%{opacity:1;transform:translateY(-10px) scale(1.1);}100%{transform:translateY(-120px) scale(1);opacity:0;}}
  .heart{position:fixed;pointer-events:none;z-index:79;font-size:18px;}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#fff;border:1px solid var(--blue);color:var(--ivory);padding:13px 20px;border-radius:16px;font-weight:700;font-size:14px;box-shadow:var(--shadow);z-index:90;opacity:0;transition:.3s;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .levelup{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:85;pointer-events:none;}
  .levelup.show{display:flex;animation:lvlpop .3s;}
  @keyframes lvlpop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
  .levelup .card{background:#fff;border:1px solid var(--blue);border-radius:24px;padding:30px 40px;text-align:center;box-shadow:0 0 60px rgba(144,213,255,.6);}
  .levelup .card .e{font-size:48px;}
  .levelup .card .t{font-family:'Quicksand',sans-serif;font-size:24px;font-weight:700;margin-top:8px;}
  .levelup .card .s{color:var(--coin);font-weight:700;margin-top:4px;}

  @media (min-width:640px){
    body{padding:28px 0;}
    .app{background:#FFFFFF;border:1px solid var(--line);border-radius:30px;box-shadow:0 24px 60px rgba(90,140,180,.22);padding:8px 22px 34px;}
    header{padding-top:22px;}
    .scrim{align-items:center;background:rgba(90,140,180,.42);}

<body>
<div class="app"><div id="root"></div></div>
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="levelup" id="levelup"><div class="card"><div class="e">🎉</div><div class="t">Level Up!</div><div class="s" id="lvlText"></div></div></div>
<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat build so the existing code & onclick handlers keep working) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* ============================================================
   ⬇⬇⬇  PASTE YOUR FIREBASE CONFIG HERE  ⬇⬇⬇
   Firebase console → Project settings → Your apps → SDK setup
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyAVMIcqC-Lm1cY2QiUQ7VkGHkUsiJv5t28",
  authDomain: "polarise-d3854.firebaseapp.com",
  projectId: "polarise-d3854",
  storageBucket: "polarise-d3854.firebasestorage.app",
  messagingSenderId: "792812916784",
  appId: "1:792812916784:web:d90a94dbf910b71e6b5df5"
};
/* ============================================================ */

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC = db.collection('polarise').doc('shared');   // one shared game doc for the two of you

const XP_PER_LEVEL = 500;
const LS_IDENTITY = 'polarise-identity';   // which side THIS device is (kept local, never shared)

const APP_VERSION = '2.4';
const CHANGELOG = [
  {v:'2.4', notes:['Added a second player — quests and points are now per-person','Quest Master can switch between players with a tap','Shared reward shop; each player spends their own points']},
  {v:'2.3', notes:['Completed quests now need Quest Master approval before points are added','Approve or reject from your Quests tab','Points and reward costs can now be 5 up to 10,000']},
  {v:'2.2', notes:['Sort quests and rewards by points or A–Z']},
  {v:'2.1', notes:['Fixed data not saving between sessions','More reliable Firebase sync on reopen']},
  {v:'2.0', notes:['Daily quests that reset every midnight','Quest Master can adjust points and undo cleared quests','Custom orbit-star logo and app icon','Password lock on both sides','Removed the Activity tab','This in-app changelog']},
  {v:'1.0', notes:['First launch: quests, points and rewards','Live two-phone sync over Firebase','Quest Master and Player split']}
];

const DEFAULT_STATE = {
  identity: null,            // overlaid from localStorage per-device
  masterPassword: null,      // shared (so it persists); only his side ever uses it
  playerPassword: null,      // her side password (optional)
  broPassword: null,         // player 2 (brother) password (optional)
  lastResetDate: null,
  players: { him:{name:'You'}, her:{name:'Her', points:0, totalEarned:0, streak:0, lastDay:null}, bro:{name:'Player 2', points:0, totalEarned:0, streak:0, lastDay:null} },
  quests: [], rewards: [], redemptions: [], activity: [], tab:'quests'
};

let state = structuredClone(DEFAULT_STATE);
let viewAs = null;     // runtime-only peek; never saved
let masterFocus = 'her';   // which player the Quest Master is currently managing
let questSort='default', rewardSort='default';   // UI-only sort preference
function sortList(arr, mode, key){
  const a=[...arr];
  if(mode==='az') return a.sort((x,y)=>(x.title||'').localeCompare(y.title||''));
  if(mode==='high') return a.sort((x,y)=>(y[key]||0)-(x[key]||0));
  if(mode==='low') return a.sort((x,y)=>(x[key]||0)-(y[key]||0));
  return a;
}
function setQuestSort(m){ questSort=m; render(); }
function setRewardSort(m){ rewardSort=m; render(); }
function clampPts(v){ return Math.min(10000, Math.max(5, Math.round(+v||5))); }
function sortBar(kind){
  const cur = kind==='quest'?questSort:rewardSort;
  const setter = kind==='quest'?'setQuestSort':'setRewardSort';
  const opts=[['default','Default'],['high','Points ↓'],['low','Points ↑'],['az','A–Z']];
  return `<div class="sortbar"><span class="sortlab">Sort</span>${opts.map(([k,l])=>`<button class="sortpill ${cur===k?'active':''}" onclick="${setter}('${k}')">${l}</button>`).join('')}</div>`;
}
let synced = false;    // becomes true after first Firestore snapshot

function identityLS(){ try{ return localStorage.getItem(LS_IDENTITY)||null; }catch(e){ return null; } }
function setIdentityLS(v){ try{ v?localStorage.setItem(LS_IDENTITY,v):localStorage.removeItem(LS_IDENTITY); }catch(e){} }

function deepMerge(base,over){ const o=Object.assign({},base,over); o.players=Object.assign({},base.players,over.players||{}); ['him','her','bro'].forEach(k=>{ o.players[k]=Object.assign({},base.players[k],(over.players&&over.players[k])||{}); }); return o; }

/* live sync — fires immediately and again on every change from either phone */
function load(){
  state.identity = identityLS();
  root().innerHTML = `<div class="empty" style="padding-top:120px;"><span class="big">🌙</span>Connecting…</div>`;
  DOC.onSnapshot(snap=>{
    const localId = identityLS(), localTab = state.tab;
    if(snap.exists){
      // real data exists — load it
      state = deepMerge(structuredClone(DEFAULT_STATE), snap.data());
      state.quests.forEach(q=>{ if(!q.for) q.for='her'; });
      state.redemptions.forEach(r=>{ if(!r.by){ r.by='her'; r.byName=state.players.her.name; } });
      synced = true;
    } else if(snap.metadata && snap.metadata.fromCache){
      // the "missing" answer came from local cache, not the server — wait, do NOT overwrite
      return;
    } else {
      // the SERVER confirms the doc genuinely doesn't exist yet — safe to create it once
      state = structuredClone(DEFAULT_STATE); seedIfEmpty(); synced = true; save();
    }
    state.identity = localId;
    state.tab = localTab || 'quests';
    checkDailyReset();
    render();
  }, err=>{ console.error(err); root().innerHTML = `<div class="empty" style="padding-top:100px;"><span class="big">⚠️</span>Couldn't reach the database.<br>Check your Firebase config &amp; Firestore rules.</div>`; });
}

/* save the SHARED fields only (identity & tab stay on-device) */
function save(){
  if(!synced) return;   // never write before real server data has loaded — this is what prevents wiping your data
  const {identity, tab, ...shared} = state;
  DOC.set(shared).catch(e=>{ console.error('save failed',e); toast('Save failed — '+((e&&e.code)||'check connection')); });
}

function seedIfEmpty(){
  if(state.quests.length===0 && state.rewards.length===0 && state.activity.length===0){
    state.quests=[{id:uid(),title:'Send me a good-morning voice note',note:'',points:30,status:'active',at:Date.now()},{id:uid(),title:'Plan a surprise for the weekend',note:'Anything counts — coffee, a walk, a playlist.',points:80,status:'active',at:Date.now()}];
    state.rewards=[{id:uid(),title:'Winner picks the next date',cost:100},{id:uid(),title:'Breakfast in bed, no questions',cost:250}];
  }
}

const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
const PLAYER_KEYS=['her','bro'];
const him=()=>state.players.him;
const P=(k)=>state.players[k]||state.players.her;
function activePlayerKey(){ const r=viewAs||state.identity; return (r==='her'||r==='bro')?r:masterFocus; }
const activePlayer=()=>P(activePlayerKey());
const her=()=>activePlayer();   // "the player in focus" — alias used throughout the views
const level=(k)=>Math.floor(P(k||activePlayerKey()).totalEarned/XP_PER_LEVEL)+1;
const xpInLevel=(k)=>P(k||activePlayerKey()).totalEarned%XP_PER_LEVEL;
const questsFor=(k)=>state.quests.filter(q=>(q.for||'her')===k);
const obscure=s=>btoa(unescape(encodeURIComponent(s||'')));
function logActivity(emoji,text){ state.activity.unshift({id:uid(),emoji,text,at:Date.now()}); state.activity=state.activity.slice(0,40); }

/* ---------- mutations ---------- */
function completeQuest(id,ev){
  const q=state.quests.find(x=>x.id===id); if(!q||q.status!=='active')return;
  q.status='pending'; q.completedAt=Date.now();
  logActivity('📨',`<b>${her().name}</b> submitted "${q.title}" for approval`);
  save(); render(); toast(`Sent to ${him().name} for approval ✓`);
}
function approveQuest(id,ev){
  const q=state.quests.find(x=>x.id===id); if(!q||q.status!=='pending')return;
  const k=q.for||'her';
  q.status='done'; q.approvedAt=Date.now();
  const before=level(k); P(k).points+=q.points; P(k).totalEarned+=q.points;
  const t=today(); if(P(k).lastDay!==t){ const y=new Date(Date.now()-864e5).toISOString().slice(0,10); P(k).streak=(P(k).lastDay===y)?P(k).streak+1:1; P(k).lastDay=t; }
  logActivity('✅',`<b>${him().name}</b> approved "${q.title}" for <b>${P(k).name}</b> — <b>+${q.points}</b>`); flyPoints(q.points,ev); save(); render();
  if(level(k)>before){ setTimeout(()=>showLevelUp(k),500); }
}
function rejectQuest(id){
  const q=state.quests.find(x=>x.id===id); if(!q||q.status!=='pending')return;
  const k=q.for||'her';
  q.status='active'; delete q.completedAt;
  logActivity('↩',`<b>${him().name}</b> sent "${q.title}" back to ${P(k).name}`); save(); render(); toast(`Sent back to ${P(k).name}`);
}
function addQuest(d){ const f=d.for||'her'; state.quests.unshift({id:uid(),title:d.title,note:d.note,points:d.points,status:'active',for:f,at:Date.now()}); logActivity('📜',`<b>${him().name}</b> added a quest for <b>${P(f).name}</b>: "${d.title}"`); save(); render(); }
function editQuest(id,d){ const q=state.quests.find(x=>x.id===id); if(!q)return; q.title=d.title; q.note=d.note; q.points=d.points; logActivity('✏️',`<b>${him().name}</b> updated quest: "${d.title}"`); save(); render(); toast('Quest updated ✓'); }

function checkDailyReset(){
  const t=today();
  if(state.lastResetDate && state.lastResetDate!==t){
    state.quests.forEach(q=>{ q.status='active'; delete q.completedAt; });
    logActivity('🌅',`New day! ${state.quests.length} quest${state.quests.length===1?'':'s'} reset.`);
    save();
  }
  if(state.lastResetDate!==t){ state.lastResetDate=t; save(); }
}

function timeToMidnight(){
  const now=new Date(), midnight=new Date(now); midnight.setHours(24,0,0,0);
  const ms=midnight-now, h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
  return h>0?`${h}h ${m}m`:`${m}m`;
}
function addReward(d){ state.rewards.unshift({id:uid(),title:d.title,cost:d.cost}); logActivity('🎁',`<b>${him().name}</b> added a reward: "${d.title}"`); save(); render(); }
function redeem(id){ const r=state.rewards.find(x=>x.id===id); if(!r)return; const k=activePlayerKey(); if(P(k).points<r.cost){ toast("Not enough points yet!"); return; } P(k).points-=r.cost; state.redemptions.unshift({id:uid(),title:r.title,cost:r.cost,by:k,byName:P(k).name,status:'pending',at:Date.now()}); logActivity('💝',`<b>${P(k).name}</b> redeemed "${r.title}"!`); toast("Redeemed! 🎉"); save(); render(); }
function fulfill(id){ const x=state.redemptions.find(r=>r.id===id); if(x){ x.status='fulfilled'; logActivity('🤝',`"${x.title}" was delivered to ${esc(x.byName||'')} 💕`); save(); render(); } }
function deleteQuest(id){ state.quests=state.quests.filter(q=>q.id!==id); save(); render(); }
function adjustPoints(delta){ const k=activePlayerKey(); P(k).points=Math.max(0,P(k).points+delta); P(k).totalEarned=Math.max(0,P(k).totalEarned+delta); logActivity(delta>=0?'➕':'➖',`<b>${him().name}</b> ${delta>=0?'added':'removed'} ${Math.abs(delta)} points ${delta>=0?'to':'from'} ${P(k).name}`); save(); render(); toast(delta>=0?`Added ${delta} points`:`Removed ${Math.abs(delta)} points`); }
function undoComplete(id){ const q=state.quests.find(x=>x.id===id); if(!q||q.status!=='done')return; const k=q.for||'her'; q.status='active'; delete q.completedAt; delete q.approvedAt; P(k).points=Math.max(0,P(k).points-q.points); P(k).totalEarned=Math.max(0,P(k).totalEarned-q.points); logActivity('↩',`<b>${him().name}</b> undid "${q.title}" — took back ${q.points} from ${P(k).name}`); save(); render(); toast('Quest reverted ✓'); }
function deleteReward(id){ if(confirm('Remove this reward?')){ state.rewards=state.rewards.filter(r=>r.id!==id); save(); render(); } }

/* ---------- identity & auth ---------- */
function chooseRole(r){ setIdentityLS(r); state.identity=r; viewAs=null; state.tab='quests'; render(); }
function masterGate(){ if(!state.masterPassword) openCreatePw('him'); else openEnterPw('him'); }
function playerGate(role){ const f=pwField(role); if(!state[f]) openCreatePw(role); else openEnterPw(role); }
function pwField(r){ return r==='him'?'masterPassword':(r==='bro'?'broPassword':'playerPassword'); }
function roleName(r){ return r==='him'?him().name:P(r).name; }
function peekHer(){ viewAs=masterFocus; closeSheet(); render(); }
function backToMaster(){ viewAs=null; render(); }
function changeWho(){ setIdentityLS(null); state.identity=null; viewAs=null; closeSheet(); render(); }
function setTab(t){ state.tab=t; render(); }
function setMasterFocus(k){ masterFocus=k; render(); }

/* ---------- render ---------- */
const root=()=>document.getElementById('root');
function render(){
  if(!state.identity){ root().innerHTML=viewRolePick(); return; }
  if(state.tab!=='rewards' && state.tab!=='quests') state.tab='quests';
  const role = viewAs || state.identity;
  if(role==='him'){ root().innerHTML=viewHim(); }
  else { root().innerHTML=(viewAs?peekBar():'')+viewHer(); }
}

function viewRolePick(){
  const mLock = state.masterPassword ? '🔒' : '➕';
  const pBtn=(k,icon)=>{ const locked=state[pwField(k)]; return `<button class="rp-btn player" onclick="playerGate('${k}')"><span class="rp-ic">${icon}${locked?'<span class="lock">🔒</span>':''}</span><span><b>${esc(P(k).name)}</b><small>${locked?'Player — password protected':'Player — clear quests &amp; earn points'}</small></span></button>`; };
  return `<div class="rolepick"><div class="rp-card">
    <div class="rp-iconwrap"><span class="logo-lg">${LOGO_SVG}</span></div><div class="rp-logo">Polarise <span class="em">💞</span></div>
    <div class="rp-sub">Who's opening the app?</div>
    <button class="rp-btn master" onclick="masterGate()"><span class="rp-ic">⚔️<span class="lock">${mLock}</span></span><span><b>${esc(him().name)}</b><small>Quest Master — password protected</small></span></button>
    ${pBtn('her','🌸')}
    ${pBtn('bro','🎮')}
    <div class="rp-foot">Polarise v${APP_VERSION} · every quest has a star to follow</div>
  </div></div>`;
}
function peekBar(){ return `<div class="peekbar">👀 Previewing ${esc(P(viewAs).name)}'s side<button onclick="backToMaster()">← Back to my side</button></div>`; }

const LOGO_SVG = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#A6DEFF"/><stop offset="1" stop-color="#2E8BC0"/></linearGradient></defs><rect width="100" height="100" rx="26" fill="url(#bm)"/><g transform="rotate(-28 50 50)"><ellipse cx="50" cy="50" rx="37" ry="15" fill="none" stroke="#fff" stroke-opacity="0.55" stroke-width="4.2"/><circle cx="87" cy="50" r="5.5" fill="#FFB0C8"/></g><path d="M50 17 Q50 50 83 50 Q50 50 50 83 Q50 50 17 50 Q50 50 50 17 Z" fill="#fff"/></svg>`;
function header(role){
  const badge = role==='him' ? `<span class="role-badge master">⚔️ ${esc(him().name)}</span>` : `<span class="role-badge player">${activePlayerKey()==='bro'?'🎮':'🌸'} ${esc(P(activePlayerKey()).name)}</span>`;
  return `<header><div class="brand"><span class="logo-sm">${LOGO_SVG}</span><h1>Polarise <span class="em">💞</span></h1></div><div class="h-right">${badge}<button class="gear" onclick="openSettings()" aria-label="Settings">⚙︎</button></div></header>`;
}
function tabs(){ const t=[['quests','📜 Quests'],['rewards','🎁 Rewards']]; return `<div class="tabs">${t.map(([k,l])=>`<button class="${state.tab===k?'active':''}" onclick="setTab('${k}')">${l}</button>`).join('')}</div>`; }

/* ===== HER APP ===== */
function viewHer(){
  const xp=xpInLevel(),pct=Math.round(xp/XP_PER_LEVEL*100);
  const hero=`<div class="hero"><div class="who">Your balance</div><div class="bal"><span class="num">${her().points}</span><span class="lab">points to spend</span></div><div class="hero-meta"><span class="pill"><span class="e">⭐</span> Level ${level()}</span><span class="pill"><span class="e">🔥</span> ${her().streak} day${her().streak===1?'':'s'}</span><span class="pill"><span class="e">🏆</span> ${her().totalEarned} earned</span></div><div class="xpwrap"><div class="xpbar"><div class="xpfill" style="width:${pct}%"></div></div><div class="xptext"><span>${xp} / ${XP_PER_LEVEL} XP</span><span>${XP_PER_LEVEL-xp} to level ${level()+1}</span></div></div></div>`;
  let body= state.tab==='rewards'?herRewards():herQuests();
  return header('her')+hero+tabs()+body;
}
function herQuests(){
  const mine=questsFor(activePlayerKey());
  const active=mine.filter(q=>q.status==='active');
  const pending=mine.filter(q=>q.status==='pending');
  const done=mine.filter(q=>q.status==='done');
  const total=mine.length, doneCount=done.length;
  const allDone=total>0&&doneCount===total;
  let h=`<div class="section-head"><h2>Daily Quests</h2></div>`;
  h+=`<div class="daily-bar">
    <div class="daily-progress"><span class="dp-count">${doneCount}<span class="dp-sep">/</span>${total}</span><span class="dp-label">approved today</span></div>
    <div class="dp-right"><span class="dp-reset">🌙 resets in ${timeToMidnight()}</span></div>
  </div>`;
  const pct=total?Math.round(doneCount/total*100):0;
  h+=`<div class="day-xpbar"><div class="day-xpfill" style="width:${pct}%"></div></div>`;
  if(allDone){ h+=`<div class="all-done-card">🎉 You cleared everything today! Points banked. Come back tomorrow.</div>`; }
  if(total){ h+=sortBar('quest'); }
  if(active.length){ h+=sortList(active,questSort,'points').map(q=>`<div class="quest"><div class="top"><div><div class="title">${esc(q.title)}</div>${q.note?`<div class="note">${esc(q.note)}</div>`:''}</div><div class="reward-tag">+${q.points}</div></div><div class="act"><button class="complete-btn" onclick="completeQuest('${q.id}',event)">Mark complete · +${q.points}</button></div></div>`).join(''); }
  if(pending.length){ h+=`<div class="grouplab sp">⏳ Waiting for ${esc(him().name)} to approve</div>`+sortList(pending,questSort,'points').map(q=>`<div class="quest pending"><div class="top"><div><div class="title">${esc(q.title)}</div></div><div class="reward-tag">+${q.points}</div></div><div class="done-stamp pend">⏳ Submitted — points land once approved</div></div>`).join(''); }
  if(done.length){ h+=`<div class="grouplab sp">Done today ✓</div>`+sortList(done,questSort,'points').map(q=>`<div class="quest done"><div class="top"><div><div class="title">${esc(q.title)}</div></div><div class="reward-tag">+${q.points}</div></div><div class="done-stamp">✓ +${q.points} points earned</div></div>`).join(''); }
  if(!total){ h+=`<div class="empty"><span class="big">🌸</span>No daily quests set yet. Check back soon!</div>`; }
  return h;
}
function herRewards(){
  let h=`<div class="section-head"><h2>Reward shop</h2></div>`;
  const onWay=state.redemptions.filter(r=>r.status==='pending' && (r.by||'her')===activePlayerKey());
  if(onWay.length){ h+=`<div class="grouplab">On its way 💕</div>`+onWay.map(r=>`<div class="pending soft"><div><div class="t">${esc(r.title)}</div><div class="s">Redeemed — waiting on ${esc(him().name)} to deliver</div></div></div>`).join(''); }
  if(state.rewards.length){ h+=sortBar('reward')+`<div class="grouplab sp">Spend your points</div>`+sortList(state.rewards,rewardSort,'cost').map(r=>{const a=her().points>=r.cost;return `<div class="reward"><div class="info"><div class="t">${esc(r.title)}</div><div class="c">💎 ${r.cost} points</div></div><button class="redeem-btn" ${a?'':'disabled'} onclick="redeem('${r.id}')">${a?'Redeem':'Locked'}</button></div>`;}).join(''); }
  else { h+=`<div class="empty"><span class="big">🎁</span>No rewards yet — ${esc(him().name)} hasn't added any.</div>`; }
  return h;
}

/* ===== HIS APP ===== */
function viewHim(){
  const k=masterFocus;
  const xp=xpInLevel(k),pct=Math.round(xp/XP_PER_LEVEL*100), owe=state.redemptions.filter(r=>r.status==='pending').length;
  const pend=questsFor(k).filter(q=>q.status==='pending').length;
  const hero=`<div class="hero master"><div class="who">${esc(P(k).name)}'s progress</div><div class="bal"><span class="num">${P(k).points}</span><span class="lab">points ${esc(P(k).name)} can spend</span></div><div class="hero-meta"><span class="pill"><span class="e">⭐</span> Level ${level(k)}</span><span class="pill"><span class="e">🔥</span> ${P(k).streak} day${P(k).streak===1?'':'s'}</span><span class="pill"><span class="e">🏆</span> ${P(k).totalEarned} earned</span></div><div class="xpwrap"><div class="xpbar"><div class="xpfill" style="width:${pct}%"></div></div><div class="xptext"><span>${xp} / ${XP_PER_LEVEL} XP</span><span>Level ${level(k)+1} at ${XP_PER_LEVEL-xp} more</span></div></div>${pend?`<div class="approve-pill" onclick="setTab('quests')">⏳ ${pend} quest${pend===1?'':'s'} from ${esc(P(k).name)} waiting for approval — tap to review</div>`:''}${owe?`<div class="owe-pill">💎 ${owe} reward${owe===1?'':'s'} owed — check the Rewards tab</div>`:''}<button class="hero-btn" onclick="openAdjustSheet()">✎ Adjust ${esc(P(k).name)}'s points</button></div>`;
  let body= state.tab==='rewards'?himRewards():himQuests();
  return header('him')+masterSwitcher()+hero+tabs()+body;
}
function masterSwitcher(){
  return `<div class="pswitch">${PLAYER_KEYS.map(k=>{
    const pend=questsFor(k).filter(q=>q.status==='pending').length;
    return `<button class="pswitch-btn ${masterFocus===k?'active':''}" onclick="setMasterFocus('${k}')">${esc(P(k).name)}${pend?`<span class="pbadge">${pend}</span>`:''}</button>`;
  }).join('')}</div>`;
}
function himQuests(){
  const mine=questsFor(masterFocus);
  const done=mine.filter(q=>q.status==='done');
  const total=mine.length;
  let h=`<div class="section-head"><h2>${esc(P(masterFocus).name)}'s Quests</h2><button class="add-btn" onclick="openQuestSheet()">＋ Add quest</button></div>`;
  h+=`<div class="daily-bar">
    <div class="daily-progress"><span class="dp-count">${done.length}<span class="dp-sep">/</span>${total}</span><span class="dp-label">${esc(P(masterFocus).name)} completed today</span></div>
    <div class="dp-right"><span class="dp-reset">🌙 resets in ${timeToMidnight()}</span></div>
  </div>`;
  const pct=total?Math.round(done.length/total*100):0;
  h+=`<div class="day-xpbar"><div class="day-xpfill" style="width:${pct}%"></div></div>`;
  if(total){
    h+=sortBar('quest');
    h+=`<div class="grouplab sp">Quest lineup — resets every midnight</div>`;
    h+=sortList(mine,questSort,'points').map(q=>himQuestRow(q)).join('');
  } else {
    h+=`<div class="empty"><span class="big">📜</span>No quests for ${esc(P(masterFocus).name)} yet. Tap <b>Add quest</b> to build their lineup.</div>`;
  }
  return h;
}
function himQuestRow(q){
  const head=`<div class="top"><div><div class="title">${esc(q.title)}</div>${q.note?`<div class="note">${esc(q.note)}</div>`:''}</div><div class="reward-tag">+${q.points}</div></div>`;
  if(q.status==='pending'){
    return `<div class="quest pending">${head}
      <div class="approve-row">
        <button class="approve-btn" onclick="approveQuest('${q.id}',event)">✓ Approve · +${q.points}</button>
        <button class="reject-btn" onclick="rejectQuest('${q.id}')">Reject</button>
      </div></div>`;
  }
  return `<div class="quest ${q.status==='done'?'done':''}">${head}
    <div class="waiting">${q.status==='done'?'✓ Cleared today':'⏳ Not cleared yet'}
      <div style="margin-left:auto;display:flex;gap:6px;">
        ${q.status==='done'?`<button class="reward-edit" onclick="undoComplete('${q.id}')">↩ Undo</button>`:''}
        <button class="reward-edit" onclick="openEditQuestSheet('${q.id}')">✏️ Edit</button>
        <button class="x-btn" onclick="deleteQuest('${q.id}')">remove</button>
      </div>
    </div>
  </div>`;
}
function himRewards(){
  let h=`<div class="section-head"><h2>Reward shop</h2><button class="add-btn" onclick="openRewardSheet()">＋ New reward</button></div>`;
  const owe=state.redemptions.filter(r=>r.status==='pending');
  if(owe.length){ h+=`<div class="grouplab coin">You owe these 👀</div>`+owe.map(r=>`<div class="pending"><div><div class="t">${esc(r.title)}</div><div class="s">${esc(r.byName||'Someone')} cashed in ${r.cost} points</div></div><button class="fulfill-btn" onclick="fulfill('${r.id}')">Mark delivered</button></div>`).join(''); }
  if(state.rewards.length){ h+=sortBar('reward')+`<div class="grouplab sp">Reward shop (shared)</div>`+sortList(state.rewards,rewardSort,'cost').map(r=>`<div class="reward"><div class="info"><div class="t">${esc(r.title)}</div><div class="c">💎 ${r.cost} points</div></div><div class="reward-actions"><button class="reward-edit" onclick="openEditRewardSheet('${r.id}')">✏️ Edit</button><button class="reward-del" onclick="deleteReward('${r.id}')" aria-label="Remove">×</button></div></div>`).join(''); }
  else { h+=`<div class="empty"><span class="big">🎁</span>No rewards yet. Add things worth earning — everyone shares this shop.</div>`; }
  return h;
}

function feed(){
  if(!state.activity.length) return `<div class="section-head"><h2>Activity</h2></div><div class="empty"><span class="big">✨</span>Nothing's happened yet. Go make a move.</div>`;
  return `<div class="section-head"><h2>Activity</h2></div>`+state.activity.map(a=>`<div class="feed-item"><div class="ic">${a.emoji}</div><div><div class="tx">${a.tx||a.text}</div><div class="tm">${timeAgo(a.at)}</div></div></div>`).join('');
}

/* ---------- sheets ---------- */
function openSheet(html){ document.getElementById('sheet').innerHTML=html; document.getElementById('scrim').classList.add('show'); }
function closeSheet(){ document.getElementById('scrim').classList.remove('show'); }
document.getElementById('scrim').addEventListener('click',e=>{ if(e.target.id==='scrim') closeSheet(); });

/* auth sheets */
function openCreatePw(role){
  const who = role==='him' ? 'the Quest Master side' : roleName(role)+"'s side";
  const whose = role==='him' ? 'your' : roleName(role)+"'s";
  openSheet(`<h3>Create ${whose} password 🔑</h3><p class="hint">Set a password for ${who}.</p>
    <div class="field"><label>New password</label><input type="password" id="pw1" autocomplete="new-password"/></div>
    <div class="field"><label>Confirm password</label><input type="password" id="pw2" autocomplete="new-password"/></div>
    <div class="sheet-actions"><button class="btn-ghost" onclick="closeSheet()">Cancel</button><button class="btn-primary" onclick="submitCreatePw('${role}')">Set &amp; enter</button></div>`);
}
function submitCreatePw(role){
  const a=document.getElementById('pw1').value, b=document.getElementById('pw2').value;
  if(a.length<4){ toast('Use at least 4 characters'); return; }
  if(a!==b){ toast("Passwords don't match"); return; }
  state[pwField(role)]=obscure(a); save(); closeSheet(); chooseRole(role);
}
function openEnterPw(role){
  const title = role==='him' ? 'Quest Master' : roleName(role);
  const whose = role==='him' ? 'your' : roleName(role)+"'s";
  openSheet(`<h3>${esc(title)} 🔒</h3><p class="hint">Enter ${whose} password to continue.</p>
    <div class="field"><label>Password</label><input type="password" id="pwIn" autocomplete="current-password"/></div>
    <div class="sheet-actions"><button class="btn-ghost" onclick="closeSheet()">Cancel</button><button class="btn-primary" onclick="submitEnterPw('${role}')">Unlock</button></div>`);
  setTimeout(()=>{const i=document.getElementById('pwIn'); if(i){ i.focus(); i.addEventListener('keydown',e=>{if(e.key==='Enter')submitEnterPw(role);}); }},50);
}
function submitEnterPw(role){
  const v=document.getElementById('pwIn').value;
  if(obscure(v)===state[pwField(role)]){ closeSheet(); chooseRole(role); }
  else { toast('Wrong password'); }
}
function openChangePw(role){
  const setting = role==='him' ? 'your password' : roleName(role)+"'s password";
  openSheet(`<h3>${state[pwField(role)]?'Change':'Set'} ${esc(setting)} 🔑</h3>
    <div class="field"><label>New password</label><input type="password" id="cpw1" autocomplete="new-password"/></div>
    <div class="field"><label>Confirm new password</label><input type="password" id="cpw2" autocomplete="new-password"/></div>
    <div class="sheet-actions"><button class="btn-ghost" onclick="openSettings()">Back</button><button class="btn-primary" onclick="submitChangePw('${role}')">Save</button></div>`);
}
function submitChangePw(role){
  const a=document.getElementById('cpw1').value,b=document.getElementById('cpw2').value;
  if(a.length<4){ toast('Use at least 4 characters'); return; }
  if(a!==b){ toast("Passwords don't match"); return; }
  state[pwField(role)]=obscure(a); save(); closeSheet(); toast('Password updated');
}
function openChangelog(){
  openSheet(`<h3>What's new ✨</h3>` + CHANGELOG.map(c=>`<div class="cl"><div class="cl-v">v${c.v}</div><ul class="cl-list">${c.notes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`).join('') + `<div class="sheet-actions" style="margin-top:14px;"><button class="btn-primary" onclick="openSettings()">Back</button></div>`);
}

/* content sheets */
function openQuestSheet(){
  openSheet(`<h3>New quest for ${esc(P(masterFocus).name)} 📜</h3>
    <div class="field"><label>What's the quest?</label><input type="text" id="qTitle" placeholder="e.g. Cook dinner tonight" autocomplete="off"/></div>
    <div class="field"><label>Note (optional)</label><textarea id="qNote" rows="2" placeholder="Any details…"></textarea></div>
    <div class="field"><label>Points reward (5–10,000)</label><div class="pts-row"><input type="number" id="qPts" class="pts-input" min="5" max="10000" step="5" value="50" inputmode="numeric"/></div></div>
    <div class="sheet-actions"><button class="btn-ghost" onclick="closeSheet()">Cancel</button><button class="btn-primary" onclick="submitQuest()">Set quest</button></div>`);
}
function submitQuest(){ const t=document.getElementById('qTitle').value.trim(); if(!t){ toast('Give the quest a name'); return; } addQuest({title:t,note:document.getElementById('qNote').value.trim(),points:clampPts(document.getElementById('qPts').value),for:masterFocus}); closeSheet(); }

function openEditQuestSheet(id){
  const q=state.quests.find(x=>x.id===id); if(!q)return;
  openSheet(`<h3>Edit quest ✏️</h3>
    <div class="field"><label>Quest</label><input type="text" id="eqTitle" value="${esc(q.title)}" autocomplete="off"/></div>
    <div class="field"><label>Note (optional)</label><textarea id="eqNote" rows="2">${esc(q.note||'')}</textarea></div>
    <div class="field"><label>Points reward (5–10,000)</label><div class="pts-row"><input type="number" id="eqPts" class="pts-input" min="5" max="10000" step="5" value="${q.points}" inputmode="numeric"/></div></div>
    <div class="sheet-actions"><button class="btn-ghost" onclick="closeSheet()">Cancel</button><button class="btn-primary" onclick="submitEditQuest('${id}')">Save changes</button></div>`);
}
function submitEditQuest(id){ const t=document.getElementById('eqTitle').value.trim(); if(!t){ toast('Give the quest a name'); return; } editQuest(id,{title:t,note:document.getElementById('eqNote').value.trim(),points:clampPts(document.getElementById('eqPts').value)}); closeSheet(); }
function openAdjustSheet(){
  openSheet(`<h3>Adjust ${esc(her().name)}'s points ✎</h3>
    <p class="hint">Fix a mistake or hand out a bonus. This updates her balance and level together.</p>
    <div class="field"><label>Amount (5–10,000)</label><div class="pts-row"><input type="number" id="adjAmt" class="pts-input" min="5" max="10000" step="5" value="50" inputmode="numeric"/></div></div>
    <div class="sheet-actions"><button class="btn-ghost" onclick="doAdjust(-1)">−  Remove</button><button class="btn-primary" onclick="doAdjust(1)">＋  Add</button></div>`);
}
function doAdjust(sign){ adjustPoints(sign*clampPts(document.getElementById('adjAmt').value)); closeSheet(); }
function openRewardSheet(){
  openSheet(`<h3>New reward 🎁</h3>
    <div class="field"><label>What's the reward?</label><input type="text" id="rTitle" placeholder="e.g. I pick the movie" autocomplete="off"/></div>
    <div class="field"><label>Cost in points (5–10,000)</label><div class="pts-row"><input type="number" id="rCost" class="pts-input" min="5" max="10000" step="5" value="200" inputmode="numeric"/></div></div>
    <div class="sheet-actions"><button class="btn-ghost" onclick="closeSheet()">Cancel</button><button class="btn-primary" onclick="submitReward()">Add reward</button></div>`);
}
function submitReward(){ const t=document.getElementById('rTitle').value.trim(); if(!t){ toast('Name the reward'); return; } addReward({title:t,cost:clampPts(document.getElementById('rCost').value)}); closeSheet(); }

function openEditRewardSheet(id){
  const r=state.rewards.find(x=>x.id===id); if(!r) return;
  openSheet(`<h3>Edit reward ✏️</h3>
    <div class="field"><label>Reward name</label><input type="text" id="erTitle" value="${esc(r.title)}" autocomplete="off"/></div>
    <div class="field"><label>Cost in points (5–10,000)</label><div class="pts-row"><input type="number" id="erCost" class="pts-input" min="5" max="10000" step="5" value="${r.cost}" inputmode="numeric"/></div></div>
    <div class="sheet-actions"><button class="btn-ghost" onclick="closeSheet()">Cancel</button><button class="btn-primary" onclick="submitEditReward('${id}')">Save changes</button></div>`);
}
function submitEditReward(id){
  const r=state.rewards.find(x=>x.id===id); if(!r) return;
  const t=document.getElementById('erTitle').value.trim(); if(!t){ toast('Give the reward a name'); return; }
  r.title=t; r.cost=clampPts(document.getElementById('erCost').value);
  logActivity('✏️',`<b>${him().name}</b> updated reward: "${t}"`);
  save(); closeSheet(); render(); toast('Reward updated ✓');
}

/* settings — branch by true identity so peeking keeps master controls */
function openSettings(){ openSheet(state.identity==='him' ? masterSettings() : playerSettings()); }
function masterSettings(){
  return `<h3>Settings ⚙︎</h3>
    <div class="field"><label>Your name</label><div class="name-edit"><input type="text" id="nHim" value="${esc(him().name)}" placeholder="You"/></div></div>
    <div class="field"><label>Player names</label><div class="name-edit"><input type="text" id="nHer" value="${esc(P('her').name)}" placeholder="Player 1"/><input type="text" id="nBro" value="${esc(P('bro').name)}" placeholder="Player 2"/></div></div>
    <button class="set-action" onclick="saveNamesThen(peekHer)">👀 Peek at ${esc(P(masterFocus).name)}'s side <span class="tail">preview</span></button>
    <button class="set-action" onclick="openChangePw('him')">🔑 Change my password</button>
    <button class="set-action" onclick="openChangePw('her')">🔐 ${state.playerPassword?'Change':'Set'} ${esc(P('her').name)}'s password</button>
    <button class="set-action" onclick="openChangePw('bro')">🔐 ${state.broPassword?'Change':'Set'} ${esc(P('bro').name)}'s password</button>
    <button class="set-action" onclick="openChangelog()">✨ What's new <span class="tail">v${APP_VERSION}</span></button>
    <button class="set-action" onclick="saveNamesThen(changeWho)">🔁 Change who I am</button>
    <button class="danger-link" onclick="resetAll()">Reset everything (points, quests, rewards)</button>
    <div class="set-ver">Polarise v${APP_VERSION}</div>
    <div class="sheet-actions" style="margin-top:14px;"><button class="btn-primary" onclick="saveSettings()">Done</button></div>`;
}
function playerSettings(){
  const k=activePlayerKey();
  return `<h3>Settings ⚙︎</h3>
    <div class="field"><label>Your name</label><div class="name-edit"><input type="text" id="nMe" value="${esc(P(k).name)}" placeholder="Your name"/></div></div>
    <button class="set-action" onclick="openChangePw('${k}')">🔑 Change my password</button>
    <button class="set-action" onclick="openChangelog()">✨ What's new <span class="tail">v${APP_VERSION}</span></button>
    <button class="set-action" onclick="changeWho()">🔁 Hand the phone over (back to picker)</button>
    <div class="set-ver">Polarise v${APP_VERSION}</div>
    <div class="sheet-actions" style="margin-top:14px;"><button class="btn-primary" onclick="saveSettings()">Done</button></div>`;
}
function grabNames(){ const a=document.getElementById('nHim'),b=document.getElementById('nHer'),c=document.getElementById('nBro'),me=document.getElementById('nMe'); if(a)him().name=a.value.trim()||'You'; if(b)P('her').name=b.value.trim()||'Player 1'; if(c)P('bro').name=c.value.trim()||'Player 2'; if(me)P(activePlayerKey()).name=me.value.trim()||P(activePlayerKey()).name; }
function saveSettings(){ grabNames(); save(); closeSheet(); render(); }
function saveNamesThen(fn){ grabNames(); save(); fn(); }
function resetAll(){ if(confirm('Wipe all points, quests, and rewards? This cannot be undone.')){ const names={him:him().name,her:P('her').name,bro:P('bro').name},id=state.identity,mpw=state.masterPassword,ppw=state.playerPassword,bpw=state.broPassword; state=structuredClone(DEFAULT_STATE); state.players.him.name=names.him; state.players.her.name=names.her; state.players.bro.name=names.bro; state.identity=id; state.masterPassword=mpw; state.playerPassword=ppw; state.broPassword=bpw; seedIfEmpty(); save(); closeSheet(); render(); } }

/* ---------- FX ---------- */
function flyPoints(n,ev){ const x=ev?ev.clientX:innerWidth/2,y=ev?ev.clientY:innerHeight/2; const f=document.createElement('div'); f.className='fly'; f.textContent='+'+n; f.style.left=(x-20)+'px'; f.style.top=(y-30)+'px'; f.style.animation='flyup 1.1s forwards'; document.body.appendChild(f); setTimeout(()=>f.remove(),1100); for(let i=0;i<8;i++){ const h=document.createElement('div'); h.className='heart'; h.textContent=['💙','💗','✨','🌸'][i%4]; h.style.left=x+'px'; h.style.top=y+'px'; document.body.appendChild(h); const ang=Math.random()*6.28,dist=40+Math.random()*60; h.animate([{transform:'translate(0,0) scale(.5)',opacity:1},{transform:`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist-30}px) scale(1.1)`,opacity:0}],{duration:900,easing:'cubic-bezier(.2,.7,.3,1)'}); setTimeout(()=>h.remove(),900); } }
let toastTimer; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2000); }
function showLevelUp(k){ const key=k||activePlayerKey(); document.getElementById('lvlText').textContent=`${P(key).name} reached Level ${level(key)}`; const l=document.getElementById('levelup'); l.classList.add('show'); setTimeout(()=>l.classList.remove('show'),2200); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function timeAgo(t){ const s=Math.floor((Date.now()-t)/1000); if(s<60)return 'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }

load();
</script>
